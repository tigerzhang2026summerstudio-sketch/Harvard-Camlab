<svg xmlns="http://www.w3.org/2000/svg" width="420" height="640" viewBox="0 0 420 640">
  <!-- Placeholder for a Cave 217 Amitāyus crop. Replace with a real mural
       image (JPG/PNG, dark background) and update config.js → murals. -->
  <defs>
    <radialGradient id="mand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a6a2f" stop-opacity="0.85"/>
      <stop offset="62%" stop-color="#5a4520" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a2010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b0" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#e8c15a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#7a5c22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2cf7e"/>
      <stop offset="60%" stop-color="#cf9f45"/>
      <stop offset="100%" stop-color="#8a5f24"/>
    </linearGradient>
    <linearGradient id="sash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c34a33"/>
      <stop offset="100%" stop-color="#7e2c1d"/>
    </linearGradient>
  </defs>

  <!-- mandorla -->
  <ellipse cx="210" cy="330" rx="158" ry="272" fill="url(#mand)"/>
  <ellipse cx="210" cy="330" rx="150" ry="262" fill="none" stroke="#e8c15a" stroke-width="5" opacity="0.5"/>
  <ellipse cx="210" cy="330" rx="128" ry="236" fill="none" stroke="#3f9b6e" stroke-width="3" opacity="0.4"/>

  <!-- halo -->
  <circle cx="210" cy="150" r="80" fill="url(#halo)"/>
  <circle cx="210" cy="150" r="66" fill="none" stroke="#fff6e0" stroke-width="3" opacity="0.6"/>

  <!-- head & uṣṇīṣa -->
  <circle cx="210" cy="112" r="15" fill="#d9ab52"/>
  <circle cx="210" cy="152" r="42" fill="#f2cf7e"/>
  <path d="M168,140 Q210,120 252,140 L248,124 Q210,104 172,124 Z" fill="#3a2c14"/>

  <!-- torso & robe -->
  <path d="M158,196 Q210,186 262,196 L296,352 Q210,388 124,352 Z" fill="url(#robe)"/>
  <path d="M170,200 Q246,236 270,340 L232,352 Q196,262 166,214 Z" fill="url(#sash)" opacity="0.85"/>

  <!-- folded arms & mudrā -->
  <ellipse cx="210" cy="336" rx="58" ry="26" fill="#eec267"/>
  <circle cx="210" cy="348" r="17" fill="#fff0c0"/>

  <!-- folded legs on the lotus seat -->
  <path d="M92,432 Q210,376 328,432 Q342,468 210,482 Q78,468 92,432 Z" fill="url(#robe)"/>
  <path d="M120,436 Q210,398 300,436" fill="none" stroke="#8a5f24" stroke-width="6" opacity="0.7"/>

  <!-- lotus seat hint -->
  <path d="M110,486 Q210,462 310,486 Q300,516 210,522 Q120,516 110,486 Z" fill="#c34a33" opacity="0.75"/>
  <path d="M140,492 Q210,474 280,492" fill="none" stroke="#ffd9a0" stroke-width="5" opacity="0.7"/>
</svg>
